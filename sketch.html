    /* ===== 网页端导航 (正常大小) ===== */
    @media (min-width: 769px) {

        }

            height: 36px !important;
        }

            flex-direction: row !important;
            flex-wrap: wrap !important;
            justify-content: center !important;

            gap: 8px !important;
            width: 100%;

            text-decoration: none;
            border-radius: 30px;
        }
        
        .nav-menu a:hover {

        }
        
        /* Hero 调整 */

        }
    }
    
    /* 更小屏幕 */

        }

        }
        
        .hero p {

            padding: 10px 15px !important;
        }
    }
</style>

    <script>
const images = [
    'images/sketch/2013年马来西亚仙本拿.JPG',
    'images/sketch/2013年越南会安.JPG',
    'images/sketch/2014年日本关西.JPG',
    'images/sketch/2015年冬天的台湾清境农场.JPG',
    'images/sketch/2015年柬埔寨01.jpg',
    'images/sketch/2015年柬埔寨02.JPG',
    'images/sketch/2016年日本关西红叶.JPG',
    'images/sketch/2017冰岛钻石沙滩.JPG',
    'images/sketch/2017年的冰岛上极光.JPG',
    'images/sketch/2017年挪威Flam.jpg',
    'images/sketch/2018年匈牙利布达佩斯.jpg',
    'images/sketch/2020年意大利巴里.jpg',
    'images/sketch/2020年意大利马泰拉.jpg',
    'images/sketch/2020年意大利Alberobello.jpg'
];
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox').classList.add('active');
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
    </script>
