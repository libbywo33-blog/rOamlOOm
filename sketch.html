<!DOCTYPE html>
<html lang="zh-CN">

<style>
    /* ===== 网页端导航 (正常大小) ===== */
    @media (min-width: 769px) {
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }
        
        .nav-menu a {
            font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', 'Yuanti SC', cursive, sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.5rem 0.8rem;
            transition: all 0.2s ease;
            border-radius: 30px;
            display: inline-block;
        }
        
        .nav-menu a:hover {
            color: var(--accent-main);
            background: rgba(163, 177, 138, 0.1);
            transform: translateY(-2px);
        }

        .logo img { height: 40px; }
        .nav-avatar { width: 36px; height: 36px; }
        .nav-btn { font-size: 1.2rem; width: 40px; height: 40px; }

        /* ✅✅✅ 关键修改：网页图片自适应（只改这里） */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .gallery-item {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    }
    
    /* ===== 手机端（完全保持你原来的） ===== */
    @media (max-width: 768px) {
        nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .logo img { height: 32px !important; }
        .nav-avatar { width: 32px !important; height: 32px !important; }

        .nav-actions {
            display: flex;
            gap: 8px;
            order: 2;
        }

        .nav-btn {
            font-size: 1.1rem !important;
            width: 36px !important;
            height: 36px !important;
        }

        .nav-menu {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            gap: 8px !important;
            width: 100%;
            order: 3;
            margin-top: 12px;
        }

        .nav-menu a {
            font-size: 1rem !important;
            padding: 6px 15px !important;
            white-space: nowrap;
        }

        .hero { min-height: 250px !important; }
        .hero p {
            font-size: 1rem !important;
            padding: 12px 20px !important;
            white-space: normal !important;
        }

        /* ✅ 手机图片保持你原来的（两列） */
        .gallery-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影 - 漫游BLOG</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Hero 保持不变 -->
<section class="hero" style="background-image: url('images/about/sketch.jpg'); background-size: cover; background-position: center; min-height: 300px; position: relative;">
    <div class="container" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center;">
        <p style="color: white; font-size: 1.5rem; background: rgba(0,0,0,0.3); padding: 18px 30px; border-radius: 50px;">
            愿每一只不被束缚的猫，都能在风中收获全部的敬意与爱意
        </p>
    </div>
</section>

<!-- Gallery -->
<main class="container">
    <div class="gallery-grid">

        <!-- 图片保持不动 -->
        <div class="gallery-item"><img src="images/sketch/2013年马来西亚仙本拿.JPG"></div>
        <div class="gallery-item"><img src="images/sketch/2013年越南会安.JPG"></div>
        <div class="gallery-item"><img src="images/sketch/2014年日本关西.JPG"></div>
        <div class="gallery-item"><img src="images/sketch/2015年冬天的台湾清境农场.JPG"></div>
        <div class="gallery-item"><img src="images/sketch/2015年柬埔寨01.JPG"></div>
        <div class="gallery-item"><img src="images/sketch/2015年柬埔寨02.JPG"></div>

    </div>
</main>

</body>
</html>
