<style>

/* ===== 图片墙优化（核心） ===== */

/* 桌面端自适应（重点） */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
}

/* 图片统一比例 */
.gallery-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 10px;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

/* hover效果（高级感） */
.gallery-item:hover img {
    transform: scale(1.05);
}

/* 手机端保持你原来的（2列） */
@media (max-width: 768px) {
    .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
}

/* ===== 图片角标 ===== */
.image-caption-corner {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 4px 8px;
    font-size: 0.7rem;
    border-radius: 4px;
}

/* ===== Hero 微调 ===== */
.hero {
    min-height: 280px;
}

</style>
</head>
