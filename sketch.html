<!DOCTYPE html>
<html lang="zh-CN">

<style>
    /* ===== 网页端导航 (正常大小) ===== */
    @media (min-width: 769px) {
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }
        
        .nav-menu a {
            font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', 'Yuanti SC', cursive, sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.5rem 0.8rem;
            transition: all 0.2s ease;
            border-radius: 30px;
            display: inline-block;
        }
        
        .nav-menu a:hover {
            color: var(--accent-main);
            background: rgba(163, 177, 138, 0.1);
            transform: translateY(-2px);
        }
        
        .logo img {
            height: 40px;
        }
        
        .nav-avatar {
            width: 36px;
            height: 36px;
        }
        
        .nav-btn {
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
        }
    }
    
    /* ===== 手机端导航 (紧凑版) ===== */
    @media (max-width: 768px) {
        nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }
        
        .logo img {
            height: 32px !important;
        }
        
        .nav-avatar {
            width: 32px !important;
            height: 32px !important;
        }
        
        .nav-actions {
            display: flex;
            gap: 8px;
            order: 2;
        }
        
        .nav-btn {
            font-size: 1.1rem !important;
            width: 36px !important;
            height: 36px !important;
        }
        
        .nav-menu {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 8px !important;
            width: 100%;
            order: 3;
            margin-top: 12px;
            padding: 5px 0;
        }
        
        .nav-menu li {
            margin: 0 !important;
        }
        
        .nav-menu a {
            font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', cursive, sans-serif;
            font-size: 1rem !important;
            padding: 6px 15px !important;
            white-space: nowrap;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            border-radius: 30px;
        }
        
        .nav-menu a:hover {
            background: var(--accent-main);
            color: white;
            transform: translateY(-2px);
        }
        
        .hero {
            min-height: 250px !important;
            margin-top: 10px;
        }
        
        .hero p {
            font-size: 1rem !important;
            padding: 12px 20px !important;
            white-space: normal !important;
            width: 95% !important;
        }
    }
    
    @media (max-width: 480px) {
        .nav-menu a {
            font-size: 0.9rem !important;
            padding: 5px 12px !important;
        }
        
        .logo img {
            height: 28px !important;
        }
        
        .nav-avatar {
            width: 28px !important;
            height: 28px !important;
        }
        
        .nav-btn {
            font-size: 1rem !important;
            width: 32px !important;
            height: 32px !important;
        }
        
        .hero {
            min-height: 220px !important;
        }
        
        .hero p {
            font-size: 0.9rem !important;
            padding: 10px 15px !important;
        }
    }

    /* ===== 强制覆盖：图片网格自适应样式（全部加!important）===== */
    
    /* 覆盖原来的 .gallery-grid */
    .gallery-grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)) !important;
        gap: 1.5rem !important;
        margin: 3rem 0 !important;
    }

    /* 覆盖原来的 .gallery-item */
    .gallery-item {
        position: relative !important;
        overflow: hidden !important;
        border-radius: 8px !important;
        cursor: pointer !important;
        aspect-ratio: 1 / 1 !important;
        background-color: #e9ecef !important;
    }

    .gallery-item img {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        transition: transform 0.3s ease !important;
    }

    .gallery-item:hover img {
        transform: scale(1.05) !important;
    }

    /* 右下角文字标签 */
    .image-caption-corner {
        position: absolute !important;
        bottom: 10px !important;
        left: 10px !important;
        background: rgba(0,0,0,0.6) !important;
        color: white !important;
        padding: 4px 8px !important;
        border-radius: 4px !important;
        font-size: 0.7rem !important;
        opacity: 0.8 !important;
        pointer-events: none !important;
        z-index: 2 !important;
    }

    /* 手机端图片网格紧凑排列 */
    @media (max-width: 768px) {
        .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important;
            gap: 1rem !important;
        }
        .image-caption-corner {
            font-size: 0.6rem !important;
            padding: 3px 6px !important;
        }
    }

    @media (max-width: 480px) {
        .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
            gap: 0.8rem !important;
        }
        .image-caption-corner {
            font-size: 0.55rem !important;
            padding: 2px 5px !important;
        }
    }

    /* 确保container样式不被覆盖 */
    .container {
        max-width: 1200px !important;
        margin: 0 auto !important;
        padding: 0 1.5rem !important;
    }

    /* Lightbox 样式 */
    .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .lightbox.active {
        display: flex;
    }
    .lightbox-content {
        position: relative;
        max-width: 90%;
        max-height: 90%;
    }
    .lightbox-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    .lightbox-close {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
        background: none;
        border: none;
    }
    .lightbox-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        font-size: 2rem;
        padding: 1rem;
        cursor: pointer;
    }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* 搜索模态框 */
    .search-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 999;
        justify-content: center;
        align-items: center;
    }
    .search-modal.active {
        display: flex;
    }
    .search-modal-content {
        background: var(--bg-secondary);
        padding: 2rem;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
    }
    .search-input {
        width: 100%;
        padding: 1rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
    }
</style>
    
<head>

</head>
<body>

        </div>
    </section>

    <!-- Gallery -->
    <main class="container">
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(0)">

            </div>
            <div class="gallery-item" onclick="openLightbox(1)">
                <img src="images/sketch/2013年越南会安.JPG" alt="2013年越南会安">
                <div class="image-caption-corner">2013年越南会安</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(2)">
                <img src="images/sketch/2014年日本关西.JPG" alt="2014年日本关西">
                <div class="image-caption-corner">2014年日本关西</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(3)">
                <img src="images/sketch/2015年冬天的台湾清境农场.JPG" alt="2015年冬天的台湾清境农场">
                <div class="image-caption-corner">2015年冬天的台湾清境农场</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(4)">
                <img src="images/sketch/2015年柬埔寨01.JPG" alt="2015年柬埔寨">
                <div class="image-caption-corner">2015年柬埔寨</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(5)">
                <img src="images/sketch/2015年柬埔寨02.JPG" alt="2015年柬埔寨">
                <div class="image-caption-corner">2015年柬埔寨</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(6)">
                <img src="images/sketch/2016年日本关西红叶.JPG" alt="2016年日本关西红叶">

            <div class="gallery-item" onclick="openLightbox(7)">

            <div class="gallery-item" onclick="openLightbox(9)">

            <div class="gallery-item" onclick="openLightbox(10)">
                <img src="images/sketch/2018年匈牙利布达佩斯.jpg" alt="2018年匈牙利布达佩斯">
                <div class="image-caption-corner">2018年匈牙利布达佩斯</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(11)">
                <img src="images/sketch/2020年意大利巴里.jpg" alt="2020年意大利巴里">
                <div class="image-caption-corner">2020年意大利巴里</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(12)">
                <img src="images/sketch/2020年意大利马泰拉.jpg" alt="2020年意大利马泰拉">
                <div class="image-caption-corner">2020年意大利马泰拉</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(13)">
                <img src="images/sketch/2020年意大利Alberobello.jpg" alt="2020年意大利Alberobello">
                <div class="image-caption-corner">2020年意大利Alberobello</div>

        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <button class="lightbox-nav lightbox-prev" onclick="prevImage()">&#10094;</button>
            <img class="lightbox-image" id="lightbox-image" src="" alt="">
            <button class="lightbox-nav lightbox-next" onclick="nextImage()">&#10095;</button>

    </div>

    <!-- Search Modal -->
    <div class="search-modal" id="search-modal">

            <input type="text" class="search-input" id="search-input" placeholder="搜索...">

            </div>
            <p class="footer-copyright">&copy; 2026 rOamlOOm 漫游BLOG. 保留所有权利。</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const images = [
            'images/sketch/2013年马来西亚仙本拿.JPG',
            'images/sketch/2013年越南会安.JPG',
            'images/sketch/2014年日本关西.JPG',
            'images/sketch/2015年冬天的台湾清境农场.JPG',
            'images/sketch/2015年柬埔寨01.jpg',
            'images/sketch/2015年柬埔寨02.JPG',
            'images/sketch/2016年日本关西红叶.JPG',
            'images/sketch/2017冰岛钻石沙滩.JPG',
            'images/sketch/2017年的冰岛上极光.JPG',
            'images/sketch/2017年挪威Flam.jpg',
            'images/sketch/2018年匈牙利布达佩斯.jpg',
            'images/sketch/2020年意大利巴里.jpg',
            'images/sketch/2020年意大利马泰拉.jpg',
            'images/sketch/2020年意大利Alberobello.jpg'
        ];
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox').classList.add('active');
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById('lightbox-image').src = images[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
    </script>
</body>
</html>
